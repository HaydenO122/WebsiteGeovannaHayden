<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recipes — The Cozy Spoon</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="header-inner container">
      <div class="logo-wrap">
        <img src="images/logo.png" alt="The Cozy Spoon logo" class="logo-img" style="border: 4px solid rgba(255,255,255,0.6);">
      </div>

      <nav class="top-nav">
        <a href="index.html">Home</a>
        <a href="recipes.html">Recipes</a>
        <a href="tips.html">Tips</a>
        <a href="about.html">About</a>
        <a href="feedback.html">Contact Us</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2 class="hero-title">Which meal are we preparing today?</h2>
    </section>

    <section class="cards">
      <figure class="card">
        <div class="card-offset"></div>
        <img src="images/breakfast.jpg" alt="Breakfast plate">
        <figcaption>Breakfast</figcaption>
      </figure>

      <figure class="card card-center">
        <div class="card-offset"></div>
        <img src="images/lunch.jpg" alt="Lunch plate">
        <figcaption>Lunch</figcaption>
      </figure>

      <figure class="card">
        <div class="card-offset"></div>
        <img src="images/dinner.jpg" alt="Dinner plate">
        <figcaption>Dinner</figcaption>
      </figure>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© <span id="year-recipes"></span> The Cozy Spoon</div>
  </footer>

  <script>
    document.getElementById('year-recipes').textContent = new Date().getFullYear();
  </script>
</body>
</html>
