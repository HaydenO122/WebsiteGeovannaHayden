<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recipes — The Cozy Spoon</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="site-header">
    <div class="container header-flex">
      <div class="logo-container">
        <img src="logo.png" alt="The Cozy Spoon" class="logo-img">
      </div>
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="recipes.html" class="active">Recipes</a>
        <a href="tips.html">Tips</a>
        <a href="about.html">About</a>
        <a href="feedback.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-intro">
      <h1 class="display-title">Which meal are we preparing today?</h1>
      <div class="accent-line"></div>
    </section>

    <div class="recipe-grid">
      <a href="#" class="recipe-card">
        <div class="card-image">
          <img src="breakfast.jpg" alt="Breakfast Options">
          <div class="card-overlay"><span>View Recipes</span></div>
        </div>
        <div class="card-text">
          <h3>Breakfast</h3>
        </div>
      </a>

      <a href="#" class="recipe-card">
        <div class="card-image">
          <img src="lunch.jpg" alt="Lunch Options">
          <div class="card-overlay"><span>View Recipes</span></div>
        </div>
        <div class="card-text">
          <h3>Lunch</h3>
        </div>
      </a>

      <a href="#" class="recipe-card">
        <div class="card-image">
          <img src="dinner.jpg" alt="Dinner Options">
          <div class="card-overlay"><span>View Recipes</span></div>
        </div>
        <div class="card-text">
          <h3>Dinner</h3>
        </div>
      </a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> The Cozy Spoon. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</html>
