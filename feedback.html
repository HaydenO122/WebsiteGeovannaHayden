<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact / Feedback — The Cozy Spoon</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="header-inner container">
      <div class="logo-wrap">
        <!-- PICTURE 1: Logo (circular spoon logo) -->
        <img src="images/logo.png" alt="The Cozy Spoon logo" class="logo-img" style="border: 4px solid rgba(255,255,255,0.6);">
      </div>

      <nav class="top-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="recipes.html">Recipes</a>
        <a href="tips.html">Tips</a>
        <a href="about.html">About</a>
        <a href="feedback.html">Contact Us</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="feedback-hero">
      <h2 class="hero-title">If you tried any of our recipes, or have feedback, please leave a review!</h2>

      <form class="feedback-form" action="#" method="post" onsubmit="alert('Form submitted (demo)'); return false;">
        <label>
          <span class="form-label">Name:</span>
          <input type="text" name="name" class="form-input" required>
        </label>

        <label>
          <span class="form-label">Email:</span>
          <input type="email" name="email" class="form-input" required>
        </label>

        <label>
          <span class="form-label">Review/feedback:</span>
          <textarea name="feedback" class="form-textarea" rows="4" required></textarea>
        </label>

        <div style="text-align:center; margin-top:16px;">
          <button type="submit" class="btn-primary">Submit Review</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© <span id="year-feedback"></span> The Cozy Spoon</div>
  </footer>

  <script> document.getElementById('year-feedback').textContent = new Date().getFullYear(); </script>
</body>

</html>
